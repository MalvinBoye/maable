  - '@expo/ui@56.0.11'
  - babel-preset-expo@56.0.11
  - expo-asset@56.0.13
  - expo-constants@56.0.14
  - expo-linking@56.0.11
  - expo-modules-autolinking@56.0.11
  - expo-modules-core@56.0.12
  - expo-router@56.2.5
  - expo-secure-store@56.0.4
  - expo@56.0.3
  - react-native-screens@4.25.2
